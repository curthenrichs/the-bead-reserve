name: site

on:
  push:
    paths:
      - "site/**"
      - "whitepaper/**"
      - ".github/workflows/site.yml"
  pull_request:
    paths:
      - "site/**"
      - "whitepaper/**"
      - ".github/workflows/site.yml"

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install Typst (for the whitepaper prebuild)
        uses: typst-community/setup-typst@v3

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Unit tests (Vitest + RTL)
        run: npm test

      - name: Build (runs whitepaper prebuild + astro build)
        run: npm run build
